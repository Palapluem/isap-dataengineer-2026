name: Monthly ISAP Source Check

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

jobs:
  check-new-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Check official sources
        run: python -m isap_pipeline check-new
      - name: Upload source-check evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-check-${{ github.run_number }}
          path: data/processed/source_check_latest.json
          if-no-files-found: warn
